<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HVXZ character count detection</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #e1e1e1;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #222;
            perspective: 1000px;
        }

        .DynamicEnvironment {
            position: absolute;
            top: -100%;
            left: -100%;
            width: 300%;
            height: 300%;
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #ececec 40%, #d4d4d4 70%, #f5f5f5 100%);
            background-size: 200% 200%;
            animation: SpatialFluidMotion 30s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes SpatialFluidMotion {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            50% { transform: translate(-5%, -10%) rotate(4deg) scale(1.1); }
            100% { transform: translate(5%, 5%) rotate(-2deg) scale(0.95); }
        }

        .ParticleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .OpticalInterface {
            position: relative;
            z-index: 2;
            width: 95%;
            max-width: 880px;
            padding: 4rem;
            border-radius: 36px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(1.5px);
            -webkit-backdrop-filter: blur(1.5px);
            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 
                0 40px 100px rgba(0, 0, 0, 0.03),
                inset 0 0 40px rgba(255, 255, 255, 0.4);
            opacity: 0;
            transform: translateY(40px) scale(0.95) rotateX(5deg);
            transform-style: preserve-3d;
            animation: InterfaceEpicMount 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes InterfaceEpicMount {
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1) rotateX(0deg); 
            }
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 300;
            text-align: center;
            letter-spacing: 4px;
            margin: 0 0 3.5rem 0;
            color: #333;
            text-transform: uppercase;
            text-shadow: 0 4px 12px rgba(255, 255, 255, 0.6);
            animation: TitleGlowBreathe 4s ease-in-out infinite alternate;
        }

        @keyframes TitleGlowBreathe {
            0% { letter-spacing: 4px; filter: drop-shadow(0 0 0px rgba(255,255,255,0)); }
            100% { letter-spacing: 5px; filter: drop-shadow(0 0 8px rgba(255,255,255,0.8)); }
        }

        .InputWrapper {
            position: relative;
            width: 100%;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .InputWrapper:focus-within {
            transform: translateZ(15px);
        }

        .DataInputStream {
            width: 100%;
            height: 340px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(1px);
            -webkit-backdrop-filter: blur(1px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            padding: 2.5rem;
            box-sizing: border-box;
            font-size: 1.6rem;
            line-height: 1.7;
            color: #111;
            outline: none;
            resize: none;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: inset 0 4px 20px rgba(0, 0, 0, 0.01);
        }

        .DataInputStream:focus {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.95);
            box-shadow: 
                inset 0 4px 20px rgba(0, 0, 0, 0.005),
                0 20px 50px rgba(0, 0, 0, 0.02);
        }

        .ControlPanel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2.5rem;
        }

        .LogicToggles {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .CheckboxEntity {
            appearance: none;
            width: 24px;
            height: 24px;
            border: 1.5px solid rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            position: relative;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .CheckboxEntity:checked {
            background: #222;
            border-color: #222;
            transform: scale(1.05);
        }

        .CheckboxEntity:checked::after {
            content: '';
            position: absolute;
            left: 8px;
            top: 3px;
            width: 5px;
            height: 11px;
            border: solid white;
            border-width: 0 2.5px 2.5px 0;
            transform: rotate(45deg);
        }

        .ToggleLabel {
            font-size: 1.1rem;
            color: #444;
            cursor: pointer;
            user-select: none;
            transition: color 0.3s;
        }

        .ToggleLabel:hover {
            color: #111;
        }

        .ExecutionTrigger {
            background: rgba(255, 255, 255, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 1.2rem 3.5rem;
            font-size: 1.1rem;
            font-weight: 500;
            border-radius: 16px;
            cursor: pointer;
            letter-spacing: 2px;
            color: #222;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .ExecutionTrigger::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300%;
            height: 300%;
            background: rgba(255, 255, 255, 0.6);
            transform: translate(-50%, -50%) scale(0);
            border-radius: 50%;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
            z-index: 0;
        }

        .ExecutionTrigger:hover {
            background: rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 1);
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.03);
        }

        .ExecutionTrigger:hover::before {
            transform: translate(-50%, -50%) scale(1);
        }

        .ExecutionTrigger:active {
            transform: translateY(-1px) scale(0.99);
        }

        .ExecutionTrigger span {
            position: relative;
            z-index: 1;
        }

        .MetricsStage {
            margin-top: 3.5rem;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .AppleSpinner {
            display: none;
            width: 40px;
            height: 40px;
            position: relative;
            animation: SpinnerLockIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes SpinnerLockIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .SpinnerBlade {
            position: absolute;
            left: 18px;
            width: 4px;
            height: 11px;
            background-color: #333;
            border-radius: 2.5px;
            transform-origin: center 20px;
            animation: BladeFade 0.85s linear infinite;
        }

        @keyframes BladeFade {
            from { opacity: 1; }
            to { opacity: 0.1; }
        }

        .MetricsVisualizer {
            display: none;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(20px) scale(0.9);
        }

        .MetricsVisualizer.RevealActive {
            animation: ResultEpicReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes ResultEpicReveal {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .MetricsLabel {
            font-size: 0.95rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 0.4rem;
        }

        .MetricsValue {
            font-size: 5.5rem;
            font-weight: 200;
            color: #000;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 15px 30px rgba(0, 0, 0, 0.03);
        }
    </style>
</head>
<body>

    <div class="DynamicEnvironment"></div>
    <canvas class="ParticleCanvas" id="ParticleCanvas"></canvas>

    <div class="OpticalInterface" id="InterfaceBlock">
        <h1>HVXZ character count detection</h1>
        
        <div class="InputWrapper">
            <textarea 
                class="DataInputStream" 
                id="StreamNode" 
                placeholder="Initialize text stream..."
                spellcheck="false"
            ></textarea>
        </div>

        <div class="ControlPanel">
            <div class="LogicToggles">
                <input type="checkbox" id="SymbolFilterNode" class="CheckboxEntity" checked>
                <label for="SymbolFilterNode" class="ToggleLabel">Include punctuation</label>
            </div>
            <button class="ExecutionTrigger" id="ActionNode"><span>DETECT</span></button>
        </div>

        <div class="MetricsStage">
            <div class="AppleSpinner" id="SpinnerNode"></div>
            <div class="MetricsVisualizer" id="VisualizerNode">
                <span class="MetricsLabel">Characters</span>
                <div class="MetricsValue" id="RenderNode">0</div>
            </div>
        </div>
    </div>

    <script>
        const StreamNode = document.getElementById('StreamNode');
        const SymbolFilterNode = document.getElementById('SymbolFilterNode');
        const ActionNode = document.getElementById('ActionNode');
        const SpinnerNode = document.getElementById('SpinnerNode');
        const VisualizerNode = document.getElementById('VisualizerNode');
        const RenderNode = document.getElementById('RenderNode');
        const InterfaceBlock = document.getElementById('InterfaceBlock');
        const CanvasNode = document.getElementById('ParticleCanvas');
        const CanvasContext = CanvasNode.getContext('2d');

        let ActiveParticles = [];

        const InitializeCanvas = () => {
            CanvasNode.width = window.innerWidth;
            CanvasNode.height = window.innerHeight;
        };
        window.addEventListener('resize', InitializeCanvas);
        InitializeCanvas();

        class ParticleEntity {
            constructor(OriginX, OriginY) {
                this.PositionX = OriginX;
                this.PositionY = OriginY;
                this.VelocityX = (Math.random() - 0.5) * 6;
                this.VelocityY = (Math.random() - 0.5) * 6 - 3;
                this.Radius = Math.random() * 4 + 1.5;
                this.Alpha = 1;
                this.Decay = Math.random() * 0.02 + 0.01;
                this.Gravity = 0.05;
            }

            Update() {
                this.VelocityY += this.Gravity;
                this.PositionX += this.VelocityX;
                this.PositionY += this.VelocityY;
                this.Alpha -= this.Decay;
            }

            Draw() {
                CanvasContext.save();
                CanvasContext.globalAlpha = this.Alpha;
                CanvasContext.fillStyle = `rgba(80, 80, 80, ${this.Alpha})`;
                CanvasContext.shadowBlur = 4;
                CanvasContext.shadowColor = '#ffffff';
                CanvasContext.beginPath();
                CanvasContext.arc(this.PositionX, this.PositionY, this.Radius, 0, Math.PI * 2);
                CanvasContext.fill();
                CanvasContext.restore();
            }
        }

        const InjectMassParticles = () => {
            const Bounds = StreamNode.getBoundingClientRect();
            const TargetX = Bounds.left + 40 + (Math.random() * (Bounds.width - 80));
            const TargetY = Bounds.top + 50 + (Math.random() * (Bounds.height - 100));

            for (let Iteration = 0; Iteration < 12; Iteration++) {
                ActiveParticles.push(new ParticleEntity(TargetX, TargetY));
            }
        };

        const ProcessParticles = () => {
            CanvasContext.clearRect(0, 0, CanvasNode.width, CanvasNode.height);
            for (let Index = ActiveParticles.length - 1; Index >= 0; Index--) {
                const CurrentParticle = ActiveParticles[Index];
                CurrentParticle.Update();
                if (CurrentParticle.Alpha <= 0) {
                    ActiveParticles.splice(Index, 1);
                } else {
                    CurrentParticle.Draw();
                }
            }
            requestAnimationFrame(ProcessParticles);
        };
        requestAnimationFrame(ProcessParticles);

        const ConstructAppleSpinner = () => {
            for (let Index = 0; Index < 12; Index++) {
                const Blade = document.createElement('div');
                Blade.className = 'SpinnerBlade';
                Blade.style.transform = `rotate(${Index * 30}deg)`;
                Blade.style.animationDelay = `-${(12 - Index) * 0.07s}`;
                SpinnerNode.appendChild(Blade);
            }
        };
        ConstructAppleSpinner();

        window.addEventListener('mousemove', (Event) => {
            const XOffset = (Event.clientX - window.innerWidth / 2) / 60;
            const YOffset = (Event.clientY - window.innerHeight / 2) / 60;
            InterfaceBlock.style.transform = `rotateY(${XOffset}deg) rotateX(${-YOffset}deg)`;
        });

        const ExecuteDetectionCycle = () => {
            VisualizerNode.classList.remove('RevealActive');
            VisualizerNode.style.display = 'none';
            SpinnerNode.style.display = 'block';

            setTimeout(() => {
                let RawBuffer = StreamNode.value;

                if (!SymbolFilterNode.checked) {
                    RawBuffer = RawBuffer.replace(/[^\p{L}\p{N}]/gu, '');
                } else {
                    RawBuffer = RawBuffer.replace(/[\r\n]/g, '');
                }

                RenderNode.textContent = Array.from(RawBuffer).length;
                SpinnerNode.style.display = 'none';
                VisualizerNode.style.display = 'flex';
                
                requestAnimationFrame(() => {
                    VisualizerNode.classList.add('RevealActive');
                });
            }, 500);
        };

        StreamNode.addEventListener('input', InjectMassParticles);
        ActionNode.addEventListener('click', ExecuteDetectionCycle);
    </script>
</body>
</html>
