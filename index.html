<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HVXZ character count detection</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #e8e8e8;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .DynamicEnvironment {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(120deg, #e8e8e8, #f5f5f5, #e1e1e1, #eeeeee, #f0f0f0);
            background-size: 400% 400%;
            animation: ColorStream 25s ease infinite;
            z-index: 0;
        }

        @keyframes ColorStream {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .ParticleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .OpticalInterface {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 750px;
            padding: 3rem;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(1px);
            -webkit-backdrop-filter: blur(1px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.02);
            opacity: 0;
            transform: scale(0.96);
            animation: 
                InterfaceMount 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards,
                CardBreathe 5s ease-in-out infinite alternate 0.6s;
        }

        @keyframes InterfaceMount {
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes CardBreathe {
            0% { box-shadow: 0 30px 60px rgba(0, 0, 0, 0.02), inset 0 0 0px rgba(255,255,255,0); }
            100% { box-shadow: 0 35px 70px rgba(0, 0, 0, 0.04), inset 0 0 15px rgba(255,255,255,0.6); transform: translateY(-2px); }
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 300;
            text-align: center;
            letter-spacing: 2px;
            margin: 0 0 2.5rem 0;
            color: #444;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.5);
            animation: TextGlance 4s ease-in-out infinite alternate;
        }

        @keyframes TextGlance {
            0% { filter: drop-shadow(0 0 0px rgba(255,255,255,0)); }
            100% { filter: drop-shadow(0 0 4px rgba(255,255,255,0.8)); letter-spacing: 2.5px; }
        }

        .InputWrapper {
            position: relative;
            width: 100%;
        }

        .DataInputStream {
            width: 100%;
            height: 280px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(1px);
            -webkit-backdrop-filter: blur(1px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 2rem;
            box-sizing: border-box;
            font-size: 1.4rem;
            line-height: 1.6;
            color: #111;
            outline: none;
            resize: none;
            transition: border-color 0.4s, background-color 0.4s, box-shadow 0.4s;
        }

        .DataInputStream:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5), inset 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .ControlPanel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
        }

        .LogicToggles {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .CheckboxEntity {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            position: relative;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .CheckboxEntity:checked {
            background: #444;
            border-color: #444;
            transform: scale(1.05);
        }

        .CheckboxEntity:checked::after {
            content: '';
            position: absolute;
            left: 6px;
            top: 2px;
            width: 4px;
            height: 9px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .ToggleLabel {
            font-size: 1rem;
            color: #555;
            cursor: pointer;
            user-select: none;
            transition: color 0.3s;
        }

        .ToggleLabel:hover {
            color: #111;
        }

        .ExecutionTrigger {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.7);
            padding: 0.8rem 2.2rem;
            font-size: 1rem;
            border-radius: 12px;
            cursor: pointer;
            letter-spacing: 1px;
            color: #333;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .ExecutionTrigger::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transform: skewX(-30deg);
            transition: none;
        }

        .ExecutionTrigger:hover {
            background: rgba(255, 255, 255, 0.7);
            border-color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.02);
        }

        .ExecutionTrigger:hover::before {
            left: 150%;
            transition: left 0.8s ease-in-out;
        }

        .ExecutionTrigger:active {
            transform: translateY(0) scale(0.98);
        }

        .MetricsStage {
            margin-top: 2.5rem;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .AppleSpinner {
            display: none;
            width: 32px;
            height: 32px;
            position: relative;
            animation: SpinnerPop 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes SpinnerPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .SpinnerBlade {
            position: absolute;
            left: 14px;
            width: 3.5px;
            height: 9px;
            background-color: #555;
            border-radius: 2px;
            transform-origin: center 16px;
            animation: BladeFade 0.8s linear infinite;
        }

        @keyframes BladeFade {
            from { opacity: 1; }
            to { opacity: 0.15; }
        }

        .MetricsVisualizer {
            display: none;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(12px);
        }

        .MetricsVisualizer.Triggered {
            animation: ResultRevealPro 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes ResultRevealPro {
            to { opacity: 1; transform: translateY(0); }
        }

        .MetricsLabel {
            font-size: 0.85rem;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.2rem;
        }

        .MetricsValue {
            font-size: 4rem;
            font-weight: 300;
            color: #111;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
    </style>
</head>
<body>

    <div class="DynamicEnvironment"></div>
    <canvas class="ParticleCanvas" id="ParticleCanvas"></canvas>

    <div class="OpticalInterface">
        <h1>HVXZ character count detection</h1>
        
        <div class="InputWrapper">
            <textarea 
                class="DataInputStream" 
                id="StreamNode" 
                placeholder="Initialize text stream..."
                spellcheck="false"
            ></textarea>
        </div>

        <div class="ControlPanel">
            <div class="LogicToggles">
                <input type="checkbox" id="SymbolFilterNode" class="CheckboxEntity" checked>
                <label for="SymbolFilterNode" class="ToggleLabel">Include punctuation</label>
            </div>
            <button class="ExecutionTrigger" id="ActionNode">DETECT</button>
        </div>

        <div class="MetricsStage">
            <div class="AppleSpinner" id="SpinnerNode"></div>
            <div class="MetricsVisualizer" id="VisualizerNode">
                <span class="MetricsLabel">Characters</span>
                <div class="MetricsValue" id="RenderNode">0</div>
            </div>
        </div>
    </div>

    <script>
        const StreamNode = document.getElementById('StreamNode');
        const SymbolFilterNode = document.getElementById('SymbolFilterNode');
        const ActionNode = document.getElementById('ActionNode');
        const SpinnerNode = document.getElementById('SpinnerNode');
        const VisualizerNode = document.getElementById('VisualizerNode');
        const RenderNode = document.getElementById('RenderNode');
        const CanvasNode = document.getElementById('ParticleCanvas');
        const CanvasContext = CanvasNode.getContext('2d');

        let ActiveParticles = [];

        const InitializeCanvas = () => {
            CanvasNode.width = window.innerWidth;
            CanvasNode.height = window.innerHeight;
        };
        window.addEventListener('resize', InitializeCanvas);
        InitializeCanvas();

        class ParticleEntity {
            constructor(OriginX, OriginY) {
                this.PositionX = OriginX;
                this.PositionY = OriginY;
                this.VelocityX = (Math.random() - 0.5) * 5;
                this.VelocityY = (Math.random() - 0.5) * 5 - 2.5;
                this.Radius = Math.random() * 3.5 + 1;
                this.Alpha = 1;
                this.Decay = Math.random() * 0.02 + 0.01;
                this.Gravity = 0.04;
            }

            Update() {
                this.VelocityY += this.Gravity;
                this.PositionX += this.VelocityX;
                this.PositionY += this.VelocityY;
                this.Alpha -= this.Decay;
            }

            Draw() {
                CanvasContext.save();
                CanvasContext.globalAlpha = this.Alpha;
                CanvasContext.fillStyle = '#555555';
                CanvasContext.shadowBlur = 3;
                CanvasContext.shadowColor = '#ffffff';
                CanvasContext.beginPath();
                CanvasContext.arc(this.PositionX, this.PositionY, this.Radius, 0, Math.PI * 2);
                CanvasContext.fill();
                CanvasContext.restore();
            }
        }

        const CreateTypographyParticles = () => {
            const Bounds = StreamNode.getBoundingClientRect();
            const CaretPositionX = Bounds.left + 30 + (Math.random() * (Bounds.width - 60));
            const CaretPositionY = Bounds.top + 40 + (Math.random() * (Bounds.height - 80));

            for (let Iteration = 0; Iteration < 10; Iteration++) {
                ActiveParticles.push(new ParticleEntity(CaretPositionX, CaretPositionY));
            }
        };

        const ProcessParticles = () => {
            CanvasContext.clearRect(0, 0, CanvasNode.width, CanvasNode.height);
            for (let Index = ActiveParticles.length - 1; Index >= 0; Index--) {
                const CurrentParticle = ActiveParticles[Index];
                CurrentParticle.Update();
                if (CurrentParticle.Alpha <= 0) {
                    ActiveParticles.splice(Index, 1);
                } else {
                    CurrentParticle.Draw();
                }
            }
            requestAnimationFrame(ProcessParticles);
        };
        requestAnimationFrame(ProcessParticles);

        const ConstructAppleSpinner = () => {
            for (let Index = 0; Index < 12; Index++) {
                const Blade = document.createElement('div');
                Blade.className = 'SpinnerBlade';
                Blade.style.transform = `rotate(${Index * 30}deg)`;
                Blade.style.animationDelay = `-${(12 - Index) * 0.066}s`;
                SpinnerNode.appendChild(Blade);
            }
        };
        ConstructAppleSpinner();

        const AnimateNumericCounter = (TargetValue) => {
            let StartTimestamp = null;
            const Duration = 350;

            const Step = (CurrentTimestamp) => {
                if (!StartTimestamp) StartTimestamp = CurrentTimestamp;
                const Elapsed = CurrentTimestamp - StartTimestamp;
                const Progress = Math.min(Elapsed / Duration, 1);
                
                const EaseOutQuad = Progress * (2 - Progress);
                const CurrentValue = Math.floor(EaseOutQuad * TargetValue);
                
                RenderNode.textContent = CurrentValue;

                if (Progress < 1) {
                    requestAnimationFrame(Step);
                } else {
                    RenderNode.textContent = TargetValue;
                }
            };
            requestAnimationFrame(Step);
        };

        const ExecuteDetectionCycle = () => {
            VisualizerNode.classList.remove('Triggered');
            VisualizerNode.style.display = 'none';
            SpinnerNode.style.display = 'block';

            setTimeout(() => {
                let RawBuffer = StreamNode.value;

                if (!SymbolFilterNode.checked) {
                    RawBuffer = RawBuffer.replace(/[^\p{L}\p{N}]/gu, '');
                } else {
                    RawBuffer = RawBuffer.replace(/[\r\n]/g, '');
                }

                const FinalCount = Array.from(RawBuffer).length;
                SpinnerNode.style.display = 'none';
                VisualizerNode.style.display = 'flex';
                
                requestAnimationFrame(() => {
                    VisualizerNode.classList.add('Triggered');
                    AnimateNumericCounter(FinalCount);
                });
            }, 500);
        };

        StreamNode.addEventListener('input', CreateTypographyParticles);
        ActionNode.addEventListener('click', ExecuteDetectionCycle);
    </script>
</body>
</html>
