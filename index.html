<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HVXZ character count detection</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #e8e8e8;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .DynamicEnvironment {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, #ffffff 0%, #f0f0f0 45%, #d8d8d8 100%);
            animation: EnvironmentBreathe 18s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
            z-index: 0;
        }

        @keyframes EnvironmentBreathe {
            0% { transform: scale(0.8) translate(0, 0); }
            100% { transform: scale(1.1) translate(2%, 3%); }
        }

        .OpticalInterface {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 680px;
            padding: 2.5rem;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.03),
                inset 0 0 20px rgba(255, 255, 255, 0.5);
            opacity: 0;
            transform: translateY(30px) scale(0.98);
            animation: InterfaceMount 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes InterfaceMount {
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 400;
            text-align: center;
            letter-spacing: 1px;
            margin: 0 0 2rem 0;
            color: #555;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.8);
        }

        .DataInputStream {
            width: 100%;
            height: 220px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(1px);
            -webkit-backdrop-filter: blur(1px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            padding: 1.5rem;
            box-sizing: border-box;
            font-size: 1.1rem;
            color: #222;
            outline: none;
            resize: none;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .DataInputStream::placeholder {
            color: #999;
            transition: opacity 0.3s ease;
        }

        .DataInputStream:focus {
            background: rgba(255, 255, 255, 0.4);
            border-color: #fff;
            box-shadow: 
                inset 0 2px 8px rgba(0, 0, 0, 0.01),
                0 0 25px rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
        }

        .DataInputStream:focus::placeholder {
            opacity: 0.5;
        }

        .LogicToggles {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-top: 1.2rem;
            gap: 0.8rem;
        }

        .CheckboxEntity {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid #ccc;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .CheckboxEntity:checked {
            background: #777;
            border-color: #777;
            box-shadow: 0 4px 10px rgba(119, 119, 119, 0.2);
        }

        .CheckboxEntity:checked::after {
            content: '';
            position: absolute;
            left: 6px;
            top: 2px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .ToggleLabel {
            font-size: 0.95rem;
            color: #666;
            cursor: pointer;
            user-select: none;
            transition: color 0.3s ease;
        }

        .ToggleLabel:hover {
            color: #333;
        }

        .MetricsVisualizer {
            margin-top: 2rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .MetricsLabel {
            font-size: 0.9rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .MetricsValue {
            font-size: 4.5rem;
            font-weight: 300;
            color: #111;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            transition: transform 0.1s ease-out, text-shadow 0.1s ease-out;
        }

        .MetricsValue.Pulse {
            transform: scale(1.08);
            text-shadow: 0 15px 25px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <div class="DynamicEnvironment"></div>

    <div class="OpticalInterface">
        <h1>HVXZ character count detection</h1>
        
        <textarea 
            class="DataInputStream" 
            id="StreamNode" 
            placeholder="Initialize text stream..."
            spellcheck="false"
        ></textarea>

        <div class="LogicToggles">
            <input type="checkbox" id="SymbolFilterNode" class="CheckboxEntity" checked>
            <label for="SymbolFilterNode" class="ToggleLabel">Include punctuation</label>
        </div>

        <div class="MetricsVisualizer">
            <span class="MetricsLabel">Characters</span>
            <div class="MetricsValue" id="RenderNode">0</div>
        </div>
    </div>

    <script>
        const StreamNode = document.getElementById('StreamNode');
        const SymbolFilterNode = document.getElementById('SymbolFilterNode');
        const RenderNode = document.getElementById('RenderNode');

        let TargetMetrics = 0;
        let CurrentMetrics = 0;
        let InterpolationFrame = null;

        const InterpolateMetrics = () => {
            if (CurrentMetrics !== TargetMetrics) {
                const Delta = TargetMetrics - CurrentMetrics;
                CurrentMetrics += Math.ceil(Delta * 0.15); 
                
                if (Math.abs(TargetMetrics - CurrentMetrics) < 1) {
                    CurrentMetrics = TargetMetrics;
                }
                
                RenderNode.textContent = CurrentMetrics;
                InterpolationFrame = requestAnimationFrame(InterpolateMetrics);
            } else {
                RenderNode.classList.remove('Pulse');
            }
        };

        const TriggerVisualPulse = () => {
            RenderNode.classList.add('Pulse');
            if (InterpolationFrame) cancelAnimationFrame(InterpolationFrame);
            InterpolateMetrics();
        };

        const ProcessStream = () => {
            let RawBuffer = StreamNode.value;

            if (!SymbolFilterNode.checked) {
                RawBuffer = RawBuffer.replace(/[^\p{L}\p{N}]/gu, '');
            } else {
                RawBuffer = RawBuffer.replace(/[\r\n]/g, '');
            }

            const EvaluatedLength = Array.from(RawBuffer).length;

            if (EvaluatedLength !== TargetMetrics) {
                TargetMetrics = EvaluatedLength;
                TriggerVisualPulse();
            }
        };

        StreamNode.addEventListener('input', ProcessStream);
        SymbolFilterNode.addEventListener('change', ProcessStream);
    </script>
</body>
</html>
